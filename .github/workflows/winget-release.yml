name: Publish to WinGet
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'De GitHub Tag/Versie (bijv. 1.0.1.0)'
        required: true
        type: string

jobs:
  winget:
    name: Submit to Windows Package Manager
    runs-on: windows-latest
    steps:
      - name: Submit package to WinGet
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Helder-Telecom-ICT.HelderRDT
          max-versions-to-keep: 5
          # Als je de knop gebruikt, pakt hij de ingevulde tag. Anders de tag van de nieuwe release.
          release-tag: ${{ github.event.inputs.tag_name || github.event.release.tag_name }}
          token: ${{ secrets.WINGET_TOKEN }}
